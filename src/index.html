<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Taylor Access HR</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
  <script>
    (function () {
      var RELOAD_GUARD_KEY = 'ta_bootstrap_chunk_reload_once';

      function reloadWithCacheBuster() {
        try {
          if (sessionStorage.getItem(RELOAD_GUARD_KEY) === '1') return;
          sessionStorage.setItem(RELOAD_GUARD_KEY, '1');
          var nextUrl = new URL(window.location.href);
          nextUrl.searchParams.set('v', Date.now().toString());
          window.location.replace(nextUrl.toString());
        } catch (_) {
          // Ignore storage/URL errors.
        }
      }

      function looksLikeModuleMimeFailure(message) {
        var text = String(message || '').toLowerCase();
        return text.indexOf('failed to load module script') !== -1
          || text.indexOf('expected a javascript-or-wasm module script') !== -1
          || text.indexOf('failed to fetch dynamically imported module') !== -1
          || text.indexOf('chunkloaderror') !== -1;
      }

      window.addEventListener('error', function (event) {
        var target = event && event.target;
        var src = String((target && target.src) || '');
        var isModuleScript = !!(target && target.tagName === 'SCRIPT' && target.type === 'module');
        var isHashedAppScript = src.indexOf('/main-') !== -1 || src.indexOf('/chunk-') !== -1;
        if ((isModuleScript && isHashedAppScript) || looksLikeModuleMimeFailure(event && event.message)) {
          reloadWithCacheBuster();
        }
      }, true);

      window.addEventListener('unhandledrejection', function (event) {
        var reason = event && event.reason;
        var message = reason && reason.message ? reason.message : reason;
        if (looksLikeModuleMimeFailure(message)) {
          reloadWithCacheBuster();
        }
      });
    })();
  </script>
</head>
<body>
  <app-root></app-root>
</body>
</html>
